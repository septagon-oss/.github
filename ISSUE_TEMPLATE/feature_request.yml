name: Feature request
description: Propose a focused improvement with a clear ownership boundary and outcome.
title: "feat: "
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you solving and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What did you reject and why?
  - type: textarea
    id: boundary
    attributes:
      label: Repository boundary
      description: Why does this belong in this repository instead of another one?
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: What observable outcome would mean this request is complete?
    validations:
      required: true
